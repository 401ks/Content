<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.6.0/aframe/build/aframe-ar.js"></script>
    <title>My AR APP - Fixed Camera</title>
  </head>
  <body>
    <a-scene embedded arjs="debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
      </a-assets>
      
      <a-marker preset="hiro">
        <!-- Enlarged model: scale 0.3 (6x bigger than original 0.05) -->
        <a-entity 
          gltf-model="#model" 
          scale="0.3 0.3 0.3" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>
      
      <!-- Camera with higher FOV = less zoomed in -->
      <a-entity camera="fov: 75"></a-entity>
    </a-scene>
  </body>
</html>
