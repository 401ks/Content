<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>
    <title>My AR APP - Real AR Duck</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      
      .message {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 15px;
        border-radius: 10px;
        z-index: 1000;
        text-align: center;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }
      
      .marker-help {
        position: fixed;
        top: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px;
        border-radius: 5px;
        z-index: 1000;
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="marker-help">
      🎯 Show this marker to camera: <strong>HIRO</strong> (black square with H inside)
    </div>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="duck" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
      </a-assets>
      
      <!-- Standard HIRO marker -->
      <a-marker preset="hiro">
        <!-- GIANT DUCK - scale 1.0 (20x bigger than original 0.05) -->
        <a-entity 
          gltf-model="#duck" 
          scale="1.0 1.0 1.0" 
          position="0 0 0"
          rotation="0 0 0">
          
          <!-- Spin animation -->
          <a-animation
            attribute="rotation"
            from="0 0 0"
            to="0 360 0"
            dur="6000"
            repeat="indefinite">
          </a-animation>
        </a-entity>
        
        <!-- Add a colored border around marker to know it's detected -->
        <a-box position="0 0 -0.1" width="1" height="1" depth="0.01" color="#00ff00" opacity="0.5"></a-box>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
    
    <div class="message">
      🦆 <strong>AR DUCK</strong> 🦆<br>
      1. Make sure you're on <strong>HTTPS or localhost</strong><br>
      2. Print or display the HIRO marker<br>
      3. Point camera at marker to see GIANT DUCK!
    </div>
  </body>
</html>
