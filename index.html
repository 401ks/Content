<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>
    <title>My AR APP - Working Duck</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      
      .instructions {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        text-align: center;
        color: white;
        background: rgba(0,0,0,0.8);
        padding: 12px;
        border-radius: 8px;
        z-index: 1000;
        font-family: Arial, sans-serif;
        font-size: 14px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="duck" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
      </a-assets>
      
      <!-- The marker that will trigger the duck -->
      <a-marker preset="hiro">
        <!-- BIG DUCK - scale 0.5 (10x bigger than original 0.05) -->
        <a-entity 
          gltf-model="#duck" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>
      
      <!-- Camera -->
      <a-entity camera></a-entity>
    </a-scene>
    
    <div class="instructions">
      🦆 Point camera at HIRO marker to see the DUCK! 🦆<br>
      Need a marker? 👉 <a href="https://raw.githubusercontent.com/artoolkit/artoolkit5/master/doc/patterns/Hiro%20pattern.pdf" target="_blank" style="color: #00ff00;">Print this</a>
    </div>
  </body>
</html>
