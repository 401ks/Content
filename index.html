<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.6.0/aframe/build/aframe-ar.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
      }
      
      .a-canvas, canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }
      
      a-scene {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
    <title>My AR APP - Fixed Camera</title>
  </head>
  <body>
    <a-scene 
      embedded 
      arjs="
        sourceType: webcam;
        debugUIEnabled: false;
        sourceWidth: 1920;
        sourceHeight: 1080;
        displayWidth: 1920;
        displayHeight: 1080;
      "
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item 
          id="model" 
          src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb">
        </a-asset-item>
      </a-assets>
      
      <a-marker preset="hiro">
        <a-entity 
          gltf-model="#model" 
          position="0 0 0" 
          scale="1.05 1.05 1.05" 
          rotation="0 0 0">
        </a-entity>
      </a-marker>
      
      <a-entity camera="fov: 55; near: 0.1; far: 1000" look-controls="enabled: false"></a-entity>
    </a-scene>
  </body>
</html>
