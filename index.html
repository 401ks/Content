<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>My AR APPup</title>
  <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
  <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.6.0/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    video { object-fit: contain !important; width: 100vw !important; height: 100vh !important; }
  </style>
</head>
<body>
  <a-scene 
    embedded 
    arjs="sourceType: webcam; sourceParameters: {facingMode: {ideal: 'environment'}, width: {ideal: 1280}, height: {ideal: 720}};"
    renderer="antialias: true; alpha: true"
    vr-mode-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="model" response-type="arraybuffer" src="http://ar.sonabsuth.com/foodplate-compressed.glb"></a-asset-item>
    </a-assets>
    
    <a-marker preset="hiro">
      <a-entity gltf-model="#model" position="0 0 0" scale="1.05 1.05 1.05"></a-entity>
    </a-marker>
    
    <a-camera camera="fov: 60; far: 10000" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
  </a-scene>
</body>
</html>
