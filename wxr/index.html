<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Restaurant Menu</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root { --primary: #e63946; --dark: #1d3557; --light: #f8f9fa; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--light); padding: 20px; padding-bottom: 40px; min-height: 100vh; }

    header { text-align: center; margin-bottom: 20px; }
    h1 { color: var(--dark); font-size: 22px; margin-bottom: 4px; }
    .platform-msg { 
      background: #fff3cd; color: #856404; padding: 10px 14px; border-radius: 8px; 
      font-size: 13px; text-align: center; margin-bottom: 16px; display: none;
    }

    .dish-card {
      background: white; border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 0 auto; max-width: 400px;
    }
    .dish-header { height: 120px; background: linear-gradient(135deg, #457b9d, #1d3557); display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .dish-body { padding: 16px; }
    .dish-name { font-size: 18px; font-weight: 700; color: var(--dark); }
    .dish-desc { font-size: 13px; color: #555; margin: 6px 0 10px; line-height: 1.4; }
    .dish-price { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }

    #ar-trigger {
      width: 100%; background: var(--dark); color: white; border: none; padding: 12px;
      border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #ar-trigger:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Debug Panel */
    #debug {
      position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.85); 
      color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 6px; 
      max-height: 120px; overflow-y: auto; display: none; z-index: 1000;
    }
    #debug.active { display: block; }

    model-viewer { width: 100%; height: 350px; background: #f0f0f0; border-radius: 8px; margin-top: 16px; }
  </style>
</head>
<body>

  <header>
    <h1>🦆 Table View AR</h1>
    <p>Point camera • Tap table • Order</p>
  </header>

  <div class="platform-msg" id="platform-msg"></div>

  <div class="dish-card">
    <div class="dish-header">🍽️</div>
    <div class="dish-body">
      <div class="dish-name">Classic Duck Confit</div>
      <div class="dish-desc">Slow-cooked with herbs, crispy skin, roasted potatoes.</div>
      <div class="dish-price">$24.99</div>
      <button id="ar-trigger" disabled>⏳ Checking AR support...</button>
    </div>
  </div>

  <model-viewer 
    id="ar-viewer"
    ar 
    ar-modes="webxr quick-look"
    camera-controls 
    auto-rotate
    shadow-intensity="1"
    alt="Duck 3D Model"
    src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb">
    
    <!-- Built-in AR button (fallback if programmatic fails) -->
    <button slot="ar-button" style="display:none;">📱 View in AR</button>
  </model-viewer>

  <div id="debug"></div>

  <script>
    const viewer = document.getElementById('ar-viewer');
    const trigger = document.getElementById('ar-trigger');
    const debug = document.getElementById('debug');
    const platformMsg = document.getElementById('platform-msg');

    function log(msg) {
      debug.innerHTML += `> ${msg}<br>`;
      debug.scrollTop = debug.scrollHeight;
      console.log('[AR]', msg);
    }

    window.addEventListener('DOMContentLoaded', async () => {
      debug.classList.add('active');
      log('Page loaded. Waiting for model-viewer...');

      await customElements.whenDefined('model-viewer');
      log('model-viewer defined.');

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isAndroid = /Android/.test(navigator.userAgent);
      const isSecure = window.isSecureContext;

      if (!isSecure) {
        log('⚠️ Not HTTPS. WebXR AR blocked by browser.');
        trigger.textContent = '⚠️ Requires HTTPS';
        trigger.disabled = true;
        return;
      }

      if (isIOS) {
        platformMsg.style.display = 'block';
        platformMsg.textContent = '🍎 iOS: Tapping AR will open Apple\'s native viewer (not in-browser camera). This is Apple\'s limitation.';
        trigger.textContent = '📱 Open in AR (Quick Look)';
      } else if (isAndroid) {
        log('✅ Android detected. WebXR AR should work.');
      } else {
        log('💻 Desktop detected. AR will be disabled.');
        trigger.textContent = '🖥️ Desktop: AR not available';
        trigger.disabled = true;
        return;
      }

      // Wait for model to load
      await new Promise(resolve => {
        viewer.addEventListener('load', resolve, { once: true });
      });
      log('Model loaded successfully.');

      const canAR = viewer.canActivateAR();
      log(`canActivateAR: ${canAR}`);

      if (canAR) {
        trigger.disabled = false;
        trigger.innerHTML = '📱 View in AR';
      } else {
        trigger.textContent = '⚠️ AR unavailable on this device';
        trigger.disabled = true;
      }
    });

    trigger.addEventListener('click', async () => {
      log('User tapped AR button.');
      if (isSecure === false) return;

      try {
        // Official Google pattern: wait for next frame, then activate
        await new Promise(r => requestAnimationFrame(r));
        await viewer.activateAR();
        log('activateAR() called successfully.');
      } catch (err) {
        log(`❌ activateAR() failed: ${err.message}`);
        // Fallback: show built-in AR button
        document.querySelector('[slot="ar-button"]').style.display = 'block';
        trigger.textContent = '⚠️ Tap the AR button above';
      }
    });
  </script>
</body>
</html>
